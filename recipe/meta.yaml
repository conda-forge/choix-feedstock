{% set name = "choix" %}
{% set version = "0.4.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 7c85d13845400932508c45a6a6a3e7a44f637969ffd506e1c7f5db07de1560b4

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - pytest-runner
    - setuptools
    - python {{ python_min }}
  run:
    - numpy
    - python >={{ python_min }}
    - scipy

test:
  requires:
    - python {{ python_min }}
    - pip
  imports:
    - choix
  commands:
    - pip check

about:
  home: https://pypi.org/project/choix/
  summary: Inference algorithms for models based on Luce's choice axiom.
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/lucasmaystre/choix

extra:
  recipe-maintainers:
    - mxr-conda
    - rluria14
    - oblute
    - synapticarbors
